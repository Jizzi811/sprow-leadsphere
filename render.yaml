# Render blueprint for SPROW LeadSphere — a single monolithic web service that
# serves BOTH the built frontend and the FastAPI + Scrapling API on one origin.
#
# The Dockerfile lives at the repo ROOT and the build context is the repo root
# (no rootDir), so Render resolves paths unambiguously.
#
# In Render: New + -> Blueprint -> pick this repo -> Apply. If a broken
# "sprow-leadsphere-api" already exists, this updates it in place (same name).
services:
  - type: web
    name: sprow-leadsphere-api
    runtime: docker
    repo: https://github.com/Jizzi811/sprow-leadsphere
    branch: main
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Enables automatic company discovery from a description. Get a free key
      # at https://brave.com/search/api/ and set the value in the Render
      # dashboard (Environment). Without it, the app still works for direct
      # website extraction; descriptions just return no results.
      - key: BRAVE_API_KEY
        sync: false
    # No ALLOWED_ORIGINS / VITE_API_URL needed: frontend and API share an origin.
    # SQLite inside the container is EPHEMERAL on the free plan (leads reset when
    # the instance restarts/sleeps). For durable storage switch to a paid plan
    # with a disk (uncomment) or an external DB (e.g. Supabase).
    # envVars:
    #   - key: DATABASE_PATH
    #     value: /var/data/leadsphere.db
    # disk:
    #   name: data
    #   mountPath: /var/data
    #   sizeGB: 1
