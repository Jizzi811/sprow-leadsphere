# Render blueprint for the SPROW LeadSphere Scrapling API.
# In Render: New + -> Blueprint -> pick this repo. After the first deploy,
# set ALLOWED_ORIGINS to your Cloudflare frontend URL under the service's
# Environment tab, then redeploy.
services:
  - type: web
    name: sprow-leadsphere-api
    runtime: docker
    dockerfilePath: ./SPROW-LeadSphere/backend/Dockerfile
    dockerContext: ./SPROW-LeadSphere/backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Comma-separated list of allowed frontend origins. Leave unset here and
      # fill it in the dashboard once the Cloudflare URL is known.
      - key: ALLOWED_ORIGINS
        sync: false
